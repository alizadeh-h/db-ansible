---
- name: Set bind-address 
  lineinfile:
    path: /etc/mysql/mariadb.conf.d/50-server.cnf
    regexp: '^bind-address\s*='
    line: 'bind-address = 0.0.0.0'
  notify: restart mariadb

- name: Add replication 
  blockinfile:
    path: /etc/mysql/mariadb.conf.d/50-server.cnf
    insertafter: '\[mysqld\]'
    block: |
      server-id    = {{ 3 if inventory_hostname == 'server3' else 4 }}
      log_bin      = /var/log/mysql/mysql-bin.log
      relay-log    = /var/log/mysql/mysql-relay-bin.log
  notify: restart mariadb

- name:  log exists 
  file:
    path: /var/log/mysql
    state: directory
    owner: mysql
    group: mysql
    mode: '0755'

- name: ownership 
  file:
    path: "{{ item }}"
    state: directory
    owner: mysql
    group: mysql
    recurse: yes
  loop:
    - /var/lib/mysql
    - /var/log/mysql

- name: Stop Slave before configuration
  mysql_replication:
    mode: stopreplica
    login_unix_socket: /var/run/mysqld/mysqld.sock
  ignore_errors: yes


- name: Configure Replication Connection
  mysql_replication:
    mode: changeprimary
    master_host: "192.168.1.122"
    master_user: "replication_user"
    master_password: "{{ replication_password }}"
    login_unix_socket: /var/run/mysqld/mysqld.sock
  ignore_errors: yes

- name: Start Slave
  mysql_replication:
    mode: startreplica
    login_unix_socket: /var/run/mysqld/mysqld.sock
  ignore_errors: yes

